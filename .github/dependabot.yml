# Phase-14 SUPPLY-1: automated dependency-update PRs.
# Composer + npm + github-actions ecosystems checked weekly. Security
# advisories are auto-fast-tracked; regular minor/major bumps wait
# for human review.
#
# Why weekly + Monday: Phase-12 BACKUP scheduler runs are already
# clustered overnight; a Monday-morning PR avoids stepping on weekend
# on-call rotation. The default grouping below batches non-security
# PRs by ecosystem so we get one PR per week to review, not 30.

version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Africa/Nairobi"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "composer"
    groups:
      composer-security:
        applies-to: "security-updates"
        update-types: ["patch", "minor", "major"]
      composer-minor-patch:
        applies-to: "version-updates"
        update-types: ["patch", "minor"]
    commit-message:
      prefix: "deps(composer)"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Africa/Nairobi"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    groups:
      npm-security:
        applies-to: "security-updates"
        update-types: ["patch", "minor", "major"]
      npm-minor-patch:
        applies-to: "version-updates"
        update-types: ["patch", "minor"]
    commit-message:
      prefix: "deps(npm)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Africa/Nairobi"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"
