name: Deploy

# Phase-11 DEPLOY-1: automated production deploy gated on green CI.
#
# Triggers:
#   workflow_run — fires after the CI workflow completes on main. If
#     the production environment hasn't been configured yet (no
#     DEPLOY_HOST secret) the job is a graceful no-op so the workflow
#     itself doesn't go red.
#   workflow_dispatch — manual trigger for re-deploying an older SHA.
#
# Required secrets / vars on the `production` GitHub environment:
#   DEPLOY_SSH_KEY   - private key with access to the production host
#   DEPLOY_HOST      - user@host (presence is what enables the deploy)
#   DEPLOY_PATH      - absolute path to the application root on the host
#
# The remote host is expected to have:
#   - the repo cloned at $DEPLOY_PATH
#   - PHP 8.4 / Composer / Node 20 / npm on PATH
#   - a populated production .env
#   - scripts/deploy.sh (this repo ships it; the host runs it)

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Override SHA to deploy (defaults to main HEAD)'
        required: false
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check whether production secrets are configured
        id: check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_HOST not set on the production environment — the deploy workflow will be a no-op until secrets are configured."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve deploy SHA
        if: steps.check.outputs.configured == 'true'
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.sha }}" ]; then
            echo "value=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.configured == 'true'
        with:
          ref: ${{ steps.sha.outputs.value }}

      - name: Create GitHub deployment
        if: steps.check.outputs.configured == 'true'
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deploy = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ steps.sha.outputs.value }}',
              environment: 'production',
              required_contexts: [],
              auto_merge: false,
              description: 'Triggered by ${{ github.event_name }}',
            });
            core.setOutput('id', deploy.data.id);

      - name: Setup SSH key
        if: steps.check.outputs.configured == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust host
        if: steps.check.outputs.configured == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$(echo '${{ secrets.DEPLOY_HOST }}' | awk -F'@' '{print $NF}')" >> ~/.ssh/known_hosts

      - name: Run deploy script on host
        if: steps.check.outputs.configured == 'true'
        run: |
          ssh '${{ secrets.DEPLOY_HOST }}' \
            "cd '${{ secrets.DEPLOY_PATH }}' && git fetch --tags origin && git checkout '${{ steps.sha.outputs.value }}' && bash scripts/deploy.sh '${{ steps.sha.outputs.value }}'"

      - name: Mark deployment success
        if: steps.check.outputs.configured == 'true' && success() && steps.deployment.outputs.id != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.id }},
              state: 'success',
              environment_url: '${{ vars.PRODUCTION_URL || '' }}',
            });

      - name: Mark deployment failure
        if: steps.check.outputs.configured == 'true' && failure() && steps.deployment.outputs.id != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.id }},
              state: 'failure',
            });
