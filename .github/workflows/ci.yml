name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Run Pint
        run: ./vendor/bin/pint --test

  test:
    name: Tests (PHPUnit)
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: propmanager_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, bcmath
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Configure .env with valid APP_KEY
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', preg_replace('/^APP_KEY=.*/m', 'APP_KEY=base64:'.base64_encode(random_bytes(32)), file_get_contents('.env')));"

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Discover packages
        run: php artisan package:discover --ansi

      - name: Configure test database
        run: |
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=propmanager_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build assets (manifest required for Inertia tests)
        run: |
          npm ci
          npm run build

      - name: Pretend-migrate (DEPLOY-5 sanity gate)
        # Surfaces invalid SQL / unsupported MySQL features before the
        # destructive --force run. Production-shape data rehearsal is
        # called out in docs/runbooks/key-rotation.md follow-up — this
        # step is the cheap minimum.
        run: php artisan migrate --pretend

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests with coverage
        # Coverage runs as a report, not a gate. Current coverage is ~38%;
        # raising to 70 (prior --min=70) will require backfilling tests in
        # legacy services. Re-enable --min=N once the floor is realistic.
        run: php artisan test --parallel --coverage

  build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

  composer-audit:
    name: Composer Audit (SUPPLY-2)
    runs-on: ubuntu-latest
    # Phase-14 SUPPLY-2: gate CVE-bearing PHP transitives. Warn-only on
    # main pushes (don't wedge unrelated work if a CVE lands upstream
    # before we can patch), but blocking on PRs so a new dep with a
    # known advisory cannot merge silently.
    continue-on-error: ${{ github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: composer audit
        run: composer audit --no-dev --locked --format=plain --abandoned=fail

      # Phase-14 SUPPLY-6: refuse install when composer.lock doesn't
      # match composer.json. Prevents a tampered or stale lockfile
      # from shipping un-audited transitives.
      - name: lockfile integrity check
        run: composer install --no-dev --no-interaction --no-progress --no-scripts --dry-run

      # Phase-14 SUPPLY-7: license inventory. Warn-only — manual
      # review on any AGPL/GPL transitive (those create copyleft
      # obligations for a SaaS, which conflicts with our MIT licence).
      - name: license inventory
        continue-on-error: true
        run: |
          composer install --no-dev --no-interaction --no-progress --no-scripts
          composer licenses --no-dev --format=json > licenses-composer.json
          # Surface AGPL / GPL families for review (non-blocking).
          jq -r '.dependencies | to_entries[] | select(.value.license[] | test("AGPL|^GPL"; "i")) | .key + " :: " + (.value.license | join(","))' licenses-composer.json || true

  npm-audit:
    name: NPM Audit (SUPPLY-3)
    runs-on: ubuntu-latest
    # Phase-14 SUPPLY-3: gate CVE-bearing JS transitives. Same
    # warn-on-main / block-on-PR pattern as composer-audit.
    continue-on-error: ${{ github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm audit (high+)
        # --omit=dev so dev-only transitives don't gate the build;
        # --audit-level=high so MEDIUM advisories warn but don't fail.
        run: npm audit --audit-level=high --omit=dev

      # Phase-14 SUPPLY-6: npm ci refuses install when package-lock.json
      # is out of sync with package.json (built-in behaviour). The
      # --ignore-scripts protects against malicious postinstall hooks
      # in a transitive package.
      - name: lockfile integrity check
        run: npm ci --ignore-scripts

  sbom:
    name: SBOM Inventory (SUPPLY-4)
    runs-on: ubuntu-latest
    needs: lint
    # Phase-14 SUPPLY-4: dependency inventory for ODPC / auditor
    # questions about third-party software processing tenant data.
    # Output is JSON-shaped (composer show + npm list) rather than
    # full CycloneDX format; the upgrade to CycloneDX is a follow-up
    # because it requires adding cyclonedx/cyclonedx-php-composer as
    # a composer plugin (touches composer.json + the allow-plugins
    # block, which is a separate PR).

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install composer dependencies (production only)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Install npm dependencies (production only)
        run: npm ci --omit=dev --ignore-scripts

      - name: Generate composer inventory
        run: composer show --format=json --no-dev > sbom-composer.json

      - name: Generate npm inventory
        run: npm list --all --json --omit=dev > sbom-npm.json || true

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-composer.json
            sbom-npm.json
          retention-days: 90
