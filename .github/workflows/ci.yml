name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Run Pint
        run: ./vendor/bin/pint --test

  phpmd:
    name: Code Complexity (PHPMD)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      # Shrink-only complexity ratchet (mirrors lint:baseline). The pre-existing
      # violations are captured in phpmd.baseline.xml; this fails ONLY on a NEW one.
      # Lower the baseline as files are cleaned (fix, then regenerate) — never
      # regenerate to bake in a new violation.
      - name: Run PHPMD (shrink-only baseline)
        run: php -d error_reporting='E_ALL & ~E_DEPRECATED' vendor/bin/phpmd app text phpmd.xml --baseline-file phpmd.baseline.xml

  test:
    name: Tests (PHPUnit)
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: propmanager_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, bcmath
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Configure .env with valid APP_KEY
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', preg_replace('/^APP_KEY=.*/m', 'APP_KEY=base64:'.base64_encode(random_bytes(32)), file_get_contents('.env')));"

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Discover packages
        run: php artisan package:discover --ansi

      - name: Configure test database
        run: |
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=propmanager_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build assets (manifest required for Inertia tests)
        run: |
          npm ci
          npm run build

      - name: Pretend-migrate (DEPLOY-5 sanity gate)
        # Surfaces invalid SQL / unsupported MySQL features before the
        # destructive --force run. Production-shape data rehearsal is
        # called out in docs/runbooks/key-rotation.md follow-up — this
        # step is the cheap minimum.
        run: php artisan migrate --pretend

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests with coverage
        # Phase-69 COVERAGE-RATCHET: a conservative floor (35, below the ~38%
        # current) so a coverage cliff fails CI while passing today. Ratchet
        # the floor UP as coverage climbs (backfill legacy-service tests);
        # never lower it — shrink-only, mirroring lint:baseline. See
        # docs/runbooks/testing.md#coverage-floor.
        run: php artisan test --parallel --coverage --min=35

  build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # Phase-23 A11Y-CI-1: static accessibility lint gate
      # (eslint-plugin-vuejs-accessibility). Blocking, like Pint —
      # catches a large class of template-level a11y regressions
      # before they merge. Baselined rules (warn-level) live in
      # eslint.config.js and ratchet toward error as later Phase-23
      # findings land.
      - name: Accessibility lint (ESLint)
        run: npm run lint

      # Phase-53 ESLINT-RATCHET-3: shrink-only baseline gate for the
      # propmanager-scoped rules (no-hardcoded-english-strings +
      # no-ltr-class). Fails CI when residual count grows past
      # .eslint-baseline.json. Lower baselines as fix commits land.
      - name: Lint baseline (Phase-53 shrink-only)
        run: npm run lint:baseline

      - name: Build assets
        run: npm run build

      # Phase-22 PERF-CI-3: fail the build if the JS bundle blows past
      # its size budget. Budgets + re-baseline instructions live in the
      # script header.
      - name: Bundle-size budget check
        run: node scripts/check-bundle-size.mjs

  config-cache-check:
    name: Config + Route Cache Validation (PERF-9)
    runs-on: ubuntu-latest
    needs: lint
    # Phase-15 PERF-9: config:cache + route:cache compile config files
    # + route definitions into a single PHP file. A closure in a
    # config file is legal at runtime but breaks the cache silently —
    # cache file is written, routing 500s in production. Catch in CI.

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Configure .env with valid APP_KEY
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', preg_replace('/^APP_KEY=.*/m', 'APP_KEY=base64:'.base64_encode(random_bytes(32)), file_get_contents('.env')));"

      - name: php artisan config:cache
        run: php artisan config:cache

      - name: php artisan route:cache
        run: php artisan route:cache

      - name: php artisan event:cache
        run: php artisan event:cache

  composer-audit:
    name: Composer Audit (SUPPLY-2)
    runs-on: ubuntu-latest
    # Phase-14 SUPPLY-2: gate CVE-bearing PHP transitives. Warn-only on
    # main pushes (don't wedge unrelated work if a CVE lands upstream
    # before we can patch), but blocking on PRs so a new dep with a
    # known advisory cannot merge silently.
    continue-on-error: ${{ github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: composer audit
        # Retry up to 3x: composer audit fetches the advisory DB from
        # repo.packagist.org, which intermittently 502s — a transient infra blip
        # must not block a merge. A genuine advisory still fails (after 3 tries),
        # since the audit exits non-zero on real findings every attempt.
        run: |
          n=0
          until composer audit --no-dev --locked --format=plain --abandoned=fail; do
            n=$((n + 1))
            if [ "$n" -ge 3 ]; then
              echo "composer audit still failing after $n attempts" >&2
              exit 1
            fi
            echo "composer audit attempt $n failed (possible transient Packagist error) — retrying in 15s..." >&2
            sleep 15
          done

      # Phase-14 SUPPLY-6: refuse install when composer.lock doesn't
      # match composer.json. Prevents a tampered or stale lockfile
      # from shipping un-audited transitives.
      - name: lockfile integrity check
        run: composer install --no-dev --no-interaction --no-progress --no-scripts --dry-run

      # Phase-14 SUPPLY-7: license inventory. Warn-only — manual
      # review on any AGPL/GPL transitive (those create copyleft
      # obligations for a SaaS, which conflicts with our MIT licence).
      - name: license inventory
        continue-on-error: true
        run: |
          composer install --no-dev --no-interaction --no-progress --no-scripts
          composer licenses --no-dev --format=json > licenses-composer.json
          # Surface AGPL / GPL families for review (non-blocking).
          jq -r '.dependencies | to_entries[] | select(.value.license[] | test("AGPL|^GPL"; "i")) | .key + " :: " + (.value.license | join(","))' licenses-composer.json || true

  npm-audit:
    name: NPM Audit (SUPPLY-3)
    runs-on: ubuntu-latest
    # Phase-14 SUPPLY-3: gate CVE-bearing JS transitives. Same
    # warn-on-main / block-on-PR pattern as composer-audit.
    continue-on-error: ${{ github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm audit (high+)
        # --omit=dev so dev-only transitives don't gate the build;
        # --audit-level=high so MEDIUM advisories warn but don't fail.
        run: npm audit --audit-level=high --omit=dev

      # Phase-14 SUPPLY-6: npm ci refuses install when package-lock.json
      # is out of sync with package.json (built-in behaviour). The
      # --ignore-scripts protects against malicious postinstall hooks
      # in a transitive package.
      - name: lockfile integrity check
        run: npm ci --ignore-scripts

  sbom:
    name: SBOM Inventory (SUPPLY-4)
    runs-on: ubuntu-latest
    needs: lint
    # Phase-14 SUPPLY-4: dependency inventory for ODPC / auditor
    # questions about third-party software processing tenant data.
    # Phase-21 DEFER-SUPPLY-1: CycloneDX 1.5 JSON now emitted alongside
    # the raw composer-show / npm-list inventory. CycloneDX is the
    # standard format security scanners (Dependency-Track, Grype,
    # Trivy) ingest — the raw JSON stays for human-readable auditor
    # questions, CycloneDX feeds the automated pipeline.

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install composer dependencies (production only)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Install npm dependencies (production only)
        run: npm ci --omit=dev --ignore-scripts

      - name: Generate composer inventory (raw)
        run: composer show --format=json --no-dev > sbom-composer.json

      - name: Generate npm inventory (raw)
        run: npm list --all --json --omit=dev > sbom-npm.json || true

      # Phase-21 DEFER-SUPPLY-1: CycloneDX format. The composer plugin
      # is invoked ad-hoc via `composer exec` so it does NOT need to be
      # in composer.json's allow-plugins block — keeps the production
      # dependency surface unchanged.
      - name: Generate CycloneDX SBOM (composer)
        run: |
          composer global require cyclonedx/cyclonedx-php-composer --no-interaction --no-progress || true
          ~/.composer/vendor/bin/cyclonedx-php-composer \
            --output-format=JSON \
            --output-file=sbom-composer.cyclonedx.json \
            --spec-version=1.5 \
            --no-dev || echo "CycloneDX composer generation skipped (plugin unavailable)"
        continue-on-error: true

      - name: Generate CycloneDX SBOM (npm)
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@latest \
            --omit dev \
            --spec-version 1.5 \
            --output-format JSON \
            --output-file sbom-npm.cyclonedx.json || echo "CycloneDX npm generation skipped"
        continue-on-error: true

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-composer.json
            sbom-npm.json
            sbom-composer.cyclonedx.json
            sbom-npm.cyclonedx.json
          retention-days: 90
          if-no-files-found: warn

  load-smoke:
    name: Load Smoke (PERF-LOAD-2)
    runs-on: ubuntu-latest
    needs: lint
    # Phase-22 PERF-LOAD-2: short k6 run against the booted app + the
    # seeded load-test landlord. k6's thresholds (SMOKE_THRESHOLDS in
    # tests/load/lib/config.js) are the gate — a breached p95 or error
    # rate makes k6 exit non-zero and fails the job. Warn-only on main
    # pushes (an infra hiccup in the smoke run must not wedge unrelated
    # merges); blocking on PRs so a latency regression cannot merge.
    continue-on-error: ${{ github.event_name == 'push' }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: propmanager_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, bcmath
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure .env with valid APP_KEY
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', preg_replace('/^APP_KEY=.*/m', 'APP_KEY=base64:'.base64_encode(random_bytes(32)), file_get_contents('.env')));"
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=propmanager_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env
          # The load test logs in as one shared user from one IP — the
          # 5/min login throttle would 429 the run. Lift it for the
          # load-test box only; we are measuring read-path latency, not
          # the auth throttle.
          echo "RATE_LIMIT_LOGIN=1000,1" >> .env

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Discover packages
        run: php artisan package:discover --ansi

      - name: Build assets (manifest required for Inertia pages)
        run: |
          npm ci
          npm run build

      - name: Migrate + seed the load-test landlord
        run: |
          php artisan migrate --force
          php artisan db:seed --class="Database\\Seeders\\LoadTestSeeder" --force

      - name: Boot the app
        run: |
          # PHP_CLI_SERVER_WORKERS lets the built-in server fork worker
          # processes (Linux-only) so it can absorb concurrent bursts —
          # notably the ~469-asset Workbox SW precache install and the
          # authenticated dashboard's code-split chunk waterfall. Without
          # it the single-threaded server resets connections under load,
          # which fails SW activation (PWA/Lighthouse) and slows logins.
          PHP_CLI_SERVER_WORKERS=10 php artisan serve --host=127.0.0.1 --port=8000 &
          # Wait for the health endpoint before handing off to k6.
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/health > /dev/null; then
              echo "app is up"; break
            fi
            sleep 1
          done

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 smoke load test
        run: k6 run tests/load/smoke.js
        env:
          BASE_URL: http://127.0.0.1:8000
          VUS: '5'
          DURATION: '45s'
          # CI runs `php artisan serve` — single-threaded, no opcache,
          # NOT production-representative. The smoke gate here is "the
          # app responds and isn't catastrophically broken/hung", not a
          # production SLO. Real latency numbers come from an operator
          # baseline.js run against php-fpm.
          SMOKE_P95_MS: '3000'
          SMOKE_ERROR_RATE: '0.05'

  a11y-smoke:
    name: Accessibility Smoke (A11Y-CI-2)
    runs-on: ubuntu-latest
    needs: lint
    # Phase-23 A11Y-CI-2: axe-core run against the hot rendered pages
    # (login + dashboard/invoices/tenants/buildings) via Playwright,
    # logged in as the seeded load-test landlord. The gate is
    # CRITICAL-only — serious/moderate violations are reported to the
    # run log as a shrink-only baseline (see tests/a11y/axe-smoke.spec.ts
    # + docs/runbooks/accessibility.md). Warn-only on main pushes (an
    # infra hiccup must not wedge unrelated merges); blocking on PRs so
    # a new critical a11y regression cannot merge — same pattern as
    # load-smoke + composer-audit.
    continue-on-error: ${{ github.event_name == 'push' }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: propmanager_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, bcmath
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure .env with valid APP_KEY
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', preg_replace('/^APP_KEY=.*/m', 'APP_KEY=base64:'.base64_encode(random_bytes(32)), file_get_contents('.env')));"
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=propmanager_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Discover packages
        run: php artisan package:discover --ansi

      - name: Build assets (manifest required for Inertia pages)
        run: |
          npm ci
          npm run build

      - name: Migrate + seed the load-test landlord
        run: |
          php artisan migrate --force
          php artisan db:seed --class="Database\\Seeders\\LoadTestSeeder" --force

      - name: Boot the app
        run: |
          # PHP_CLI_SERVER_WORKERS lets the built-in server fork worker
          # processes (Linux-only) so it can absorb concurrent bursts —
          # notably the ~469-asset Workbox SW precache install and the
          # authenticated dashboard's code-split chunk waterfall. Without
          # it the single-threaded server resets connections under load,
          # which fails SW activation (PWA/Lighthouse) and slows logins.
          PHP_CLI_SERVER_WORKERS=10 php artisan serve --host=127.0.0.1 --port=8000 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/health > /dev/null; then
              echo "app is up"; break
            fi
            sleep 1
          done

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run axe-core a11y smoke test
        run: npm run test:a11y
        env:
          A11Y_BASE_URL: http://127.0.0.1:8000

  rtl-smoke:
    name: RTL Visual Snapshots (Phase 53 RTL-BASELINES-2)
    runs-on: ubuntu-latest
    needs: lint
    # Phase-53 RTL-BASELINES-2: runs the Phase-44 [I18N-RTL]
    # 8-page visual snapshot suite against the seeded load-test
    # landlord. Same warn-on-main / block-on-PR pattern as
    # a11y-smoke. Baselines live in tests/a11y/rtl/__screenshots__/
    # and are operator-seeded via the recipe in
    # docs/runbooks/rtl-snapshots.md; CI uses strict compare (no
    # --update-snapshots), so a deliberate visual change requires a
    # seeded baseline commit on the same PR.
    continue-on-error: ${{ github.event_name == 'push' }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: propmanager_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, bcmath
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure .env with valid APP_KEY
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', preg_replace('/^APP_KEY=.*/m', 'APP_KEY=base64:'.base64_encode(random_bytes(32)), file_get_contents('.env')));"
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=propmanager_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Discover packages
        run: php artisan package:discover --ansi

      - name: Build assets (manifest required for Inertia pages)
        run: |
          npm ci
          npm run build

      - name: Migrate + seed the load-test landlord
        run: |
          php artisan migrate --force
          php artisan db:seed --class="Database\\Seeders\\LoadTestSeeder" --force

      - name: Boot the app
        run: |
          # PHP_CLI_SERVER_WORKERS lets the built-in server fork worker
          # processes (Linux-only) so it can absorb concurrent bursts —
          # notably the ~469-asset Workbox SW precache install and the
          # authenticated dashboard's code-split chunk waterfall. Without
          # it the single-threaded server resets connections under load,
          # which fails SW activation (PWA/Lighthouse) and slows logins.
          PHP_CLI_SERVER_WORKERS=10 php artisan serve --host=127.0.0.1 --port=8000 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/health > /dev/null; then
              echo "app is up"; break
            fi
            sleep 1
          done

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run RTL visual snapshot suite
        run: npm run test:rtl
        env:
          A11Y_BASE_URL: http://127.0.0.1:8000

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rtl-snapshot-diffs
          path: test-results/
          if-no-files-found: ignore

  pwa-smoke:
    name: PWA Smoke (PWA-CI-2 + PWA-CI-3)
    runs-on: ubuntu-latest
    needs: lint
    # Phase-26 PWA-CI-2 + CI-3: Playwright specs that exercise the
    # service worker (SW registers + navigation fallback to /offline)
    # and the install-prompt criteria (manifest reachable + icons
    # declared + Service-Worker-Allowed header). Same warn-on-main /
    # block-on-PR pattern as load-smoke + a11y-smoke.
    continue-on-error: ${{ github.event_name == 'push' }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: propmanager_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, bcmath
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure .env with valid APP_KEY
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', preg_replace('/^APP_KEY=.*/m', 'APP_KEY=base64:'.base64_encode(random_bytes(32)), file_get_contents('.env')));"
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=propmanager_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Discover packages
        run: php artisan package:discover --ansi

      - name: Build assets (manifest + SW required)
        run: |
          npm ci
          npm run build

      - name: Migrate + seed the load-test landlord
        run: |
          php artisan migrate --force
          php artisan db:seed --class="Database\\Seeders\\LoadTestSeeder" --force

      - name: Boot the app
        run: |
          # PHP_CLI_SERVER_WORKERS lets the built-in server fork worker
          # processes (Linux-only) so it can absorb concurrent bursts —
          # notably the ~469-asset Workbox SW precache install and the
          # authenticated dashboard's code-split chunk waterfall. Without
          # it the single-threaded server resets connections under load,
          # which fails SW activation (PWA/Lighthouse) and slows logins.
          PHP_CLI_SERVER_WORKERS=10 php artisan serve --host=127.0.0.1 --port=8000 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/health > /dev/null; then
              echo "app is up"; break
            fi
            sleep 1
          done

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run PWA smoke specs
        run: npm run test:pwa
        env:
          PWA_BASE_URL: http://127.0.0.1:8000

  lighthouse-pwa:
    name: Lighthouse best-practices >= 0.9 (PWA-CI-1)
    runs-on: ubuntu-latest
    needs: lint
    # Phase-26 PWA-CI-1: Lighthouse CI runs the best-practices category
    # against /dashboard with an authenticated cookie; the gate is
