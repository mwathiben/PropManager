    # PWA category, so the original categories:pwa gate could never run —
    # SW/offline/installability are enforced by the pwa-smoke job above.)
    # Reports upload to LHCI's temporary-public-storage for artifact
    # inspection; the URL is printed to the run log. Warn-on-main /
    # block-on-PR like the other smoke jobs.
    continue-on-error: ${{ github.event_name == 'push' }}

    services:
      mysql:
        image: mysql:8.0
