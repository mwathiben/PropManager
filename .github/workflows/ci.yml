            if curl -sf http://127.0.0.1:8000/api/health > /dev/null; then
              echo "app is up"; break
            fi
            sleep 1
          done

      # PWA-CI-1: LHCI's healthcheck + the puppeteer login script both need
      # a real Chrome binary. The job never installed one, so chrome-launcher
      # failed with "Chrome installation not found" / "path undefined" before
      # auditing. setup-chrome provisions a known build and exposes its path.
      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Lighthouse CI (PWA category)
        run: npm run test:lhci
        env:
          LHCI_BASE_URL: http://127.0.0.1:8000
          LHCI_USER_EMAIL: loadtest@propmanager.test
          LHCI_USER_PASSWORD: password
          # CHROME_PATH satisfies LHCI's chrome-launcher; PUPPETEER_EXECUTABLE_PATH
          # points the login script's puppeteer.launch() at the same binary.
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
