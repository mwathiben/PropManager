          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=propmanager_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Discover packages
        run: php artisan package:discover --ansi

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Migrate + seed the load-test landlord
        run: |
          php artisan migrate --force
          php artisan db:seed --class="Database\\Seeders\\LoadTestSeeder" --force

      - name: Boot the app
        run: |
          # PHP_CLI_SERVER_WORKERS lets the built-in server fork worker
          # processes (Linux-only) so it can absorb concurrent bursts —
          # notably the ~469-asset Workbox SW precache install and the
          # authenticated dashboard's code-split chunk waterfall. Without
          # it the single-threaded server resets connections under load,
          # which fails SW activation (PWA/Lighthouse) and slows logins.
          PHP_CLI_SERVER_WORKERS=10 php artisan serve --host=127.0.0.1 --port=8000 &
